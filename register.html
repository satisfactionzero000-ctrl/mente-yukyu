<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初回登録</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; background: #f5f5f5; }
    h1 { font-size: 20px; color: #333; }
    .form-area { background: white; padding: 20px; border-radius: 10px; margin-top: 15px; }
    label { font-size: 14px; color: #333; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
    button { width: 100%; padding: 15px; font-size: 16px; background: #06C755; color: white; border: none; border-radius: 8px; }
    .note { font-size: 12px; color: #999; margin-top: 15px; text-align: center; }
    #debug { font-size: 11px; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>初回登録</h1>
  <p id="status">読み込み中...</p>
  <div id="form" class="form-area" style="display:none;">
    <label>社員番号</label>
    <input type="text" id="employee_id" placeholder="例: E001">
    <label>氏名</label>
    <input type="text" id="name" placeholder="例: 山田太郎">
    <button id="submit">登録する</button>
    <p class="note">※初回のみの登録です。<br>登録後は有休申請・残数確認が利用できます。</p>
  </div>
  <p id="debug"></p>

  <script>
    var LIFF_ID = "https://liff.line.me/2009622120-jNqkHWvQ";
    var REGISTER_FORM_URL = "https://c-nexco-chuoh.form.kintoneapp.com/public/6b6cbb3fc8635f712e43771a6307d1f6aa876629d8025da5c1c00834712115d8?_formAccessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWJkb21haW4iOiJjLW5leGNvLWNodW9oIiwiaWF0IjoxNzc2MzA1MDk5LCJleHAiOjE3NzYzMDg2OTl9.w-j3MyblBq_63yuLl0qrxuZ-WaVvOTynWhfjRFdkEzY";
    var SALT = "cnexco-yukyu-2026-xK9mP2qR";
    var hashedId = null;
    var debugEl = document.getElementById("debug");
    var statusEl = document.getElementById("status");

    function log(msg) {
      debugEl.innerHTML = debugEl.innerHTML + msg + "<br>";
    }

    function hashUserId(userId) {
      var data = new TextEncoder().encode(userId + SALT);
      return crypto.subtle.digest("SHA-256", data).then(function(hash) {
        var array = Array.from(new Uint8Array(hash));
        return array.map(function(b) {
          return b.toString(16).padStart(2, "0");
        }).join("");
      });
    }

    function main() {
      log("1. LIFF初期化開始...");
      liff.init({ liffId: LIFF_ID }).then(function() {
        log("2. LIFF初期化成功");

        if (!liff.isLoggedIn()) {
          log("3. ログイン実行...");
          liff.login();
          return;
        }

        log("3. プロフィール取得中...");
        liff.getProfile().then(function(profile) {
          log("4. 名前: " + profile.displayName);

          hashUserId(profile.userId).then(function(hashed) {
            hashedId = hashed;
            log("5. ハッシュ化ID: " + hashedId);
            statusEl.textContent = profile.displayName + "さん、こんにちは";
            document.getElementById("form").style.display = "block";
          });
        });
      }).catch(function(err) {
        statusEl.textContent = "エラーが発生しました";
        log("エラー: " + err.message);
      });
    }

    document.getElementById("submit").addEventListener("click", function() {
      var empId = document.getElementById("employee_id").value.trim();
      var empName = document.getElementById("name").value.trim();

      if (!empId) {
        alert("社員番号を入力してください");
        return;
      }
      if (!empName) {
        alert("氏名を入力してください");
        return;
      }

      var url = REGISTER_FORM_URL
        + "?employee_id=" + encodeURIComponent(empId)
        + "&name=" + encodeURIComponent(empName)
        + "&line_user_id=" + hashedId;

      log("6. 遷移先: " + url);
      window.location.href = url;
    });

    main();
  </script>
</body>
</html>
