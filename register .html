<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初回登録</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 20px; }
    button { width: 100%; padding: 15px; font-size: 16px; background: #06C755; color: white; border: none; border-radius: 8px; margin-top: 10px; }
    #debug { font-size: 11px; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>初回登録</h1>
  <p id="status">読み込み中...</p>
  <button id="go" style="display:none;">登録フォームへ進む</button>
  <p id="debug"></p>

  <script>
    var LIFF_ID = "2009622120-jNqkHWvQ";
    var REGISTER_FORM_URL = "https://c-nexco-chuoh.form.kintoneapp.com/public/6b6cbb3fc8635f712e43771a6307d1f6aa876629d8025da5c1c00834712115d8?_formAccessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWJkb21haW4iOiJjLW5leGNvLWNodW9oIiwiaWF0IjoxNzc2MzEyNzc5LCJleHAiOjE3NzYzMTYzNzl9.nO7vt9743euC8IKaOOcch5MMW_BWYqWIry6ykDE3pOY";
    var SALT = "cnexco-yukyu-2026-xK9mP2qR";
    var hashedId = null;
    var debugEl = document.getElementById("debug");
    var statusEl = document.getElementById("status");

    function log(msg) {
      debugEl.innerHTML = debugEl.innerHTML + msg + "<br>";
    }

    function hashUserId(userId) {
      var data = new TextEncoder().encode(userId + SALT);
      return crypto.subtle.digest("SHA-256", data).then(function(hash) {
        var array = Array.from(new Uint8Array(hash));
        return array.map(function(b) {
          return b.toString(16).padStart(2, "0");
        }).join("");
      });
    }

    function main() {
      log("1. LIFF初期化開始...");
      liff.init({ liffId: LIFF_ID }).then(function() {
        log("2. LIFF初期化成功");

        if (!liff.isLoggedIn()) {
          log("3. ログイン実行...");
          liff.login();
          return;
        }

        log("3. プロフィール取得中...");
        liff.getProfile().then(function(profile) {
          log("4. 名前: " + profile.displayName);

          hashUserId(profile.userId).then(function(hashed) {
            hashedId = hashed;
            log("5. ハッシュ化ID: " + hashedId);
            statusEl.textContent = profile.displayName + "さん、こんにちは";
            document.getElementById("go").style.display = "block";
          });
        });
      }).catch(function(err) {
        statusEl.textContent = "エラーが発生しました";
        log("エラー: " + err.message);
      });
    }

    document.getElementById("go").addEventListener("click", function() {
      var url = REGISTER_FORM_URL + "?line_user_id=" + hashedId;
      log("6. 遷移先: " + url);
      window.location.href = url;
    });

    main();
  </script>
</body>
</html>
